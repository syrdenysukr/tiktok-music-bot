<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Live Music Widget</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --tiktok-red: #ff0050;
            --tiktok-cyan: #00f2fe;
            --bg-dark: rgba(12, 12, 18, 0.35); /* Transparent background for clean overlay integration */
            --bg-glass: rgba(25, 25, 35, 0.15); /* More transparent container items */
            --border-glass: rgba(255, 255, 255, 0.05); /* Very subtle borders */
            --text-primary: #ffffff;
            --text-secondary: #c0c0d8; /* Brightened up slightly for better contrast on transparent background */
            --glow-color: rgba(0, 242, 254, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent; /* Absolutely transparent background for streaming overlays */
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-primary);
        }

        /* Fullscreen Overlay for Autoplay Bypass */
        #click-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 12, 0.95);
            backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #click-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .overlay-card {
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        0 0 50px rgba(0, 242, 254, 0.15);
            max-width: 400px;
            animation: pulse-glow 3s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 242, 254, 0.1); }
            100% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 60px rgba(255, 0, 80, 0.25); }
        }

        .overlay-title {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .overlay-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .overlay-btn {
            background: linear-gradient(135deg, var(--tiktok-red), #e00040);
            border: none;
            padding: 14px 32px;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .overlay-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 0, 80, 0.6);
        }

        /* Container designed for streamer cropping/scaling */
        .widget-viewport {
            width: 100%;
            height: 100%;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
        }

        /* Unified Vertical Stream Widget */
        .stream-widget {
            width: 360px;
            background: var(--bg-dark);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 14px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        /* Dynamic glow border when active */
        .stream-widget.playing {
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), 
                        0 0 25px rgba(0, 242, 254, 0.1);
        }

        /* Top thin animated gradient bar */
        .stream-widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--tiktok-cyan), var(--tiktok-red), var(--tiktok-cyan));
            background-size: 200% auto;
            animation: border-flow 4s linear infinite;
        }

        @keyframes border-flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Widget Header */
        .widget-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--tiktok-red);
            border-radius: 50%;
        }

        .playing .pulse-indicator {
            animation: pulse-dot 1.2s infinite;
        }

        @keyframes pulse-dot {
            0% { transform: scale(0.8); opacity: 0.4; box-shadow: 0 0 0 0 rgba(255, 0, 80, 0.7); }
            70% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 0 6px rgba(255, 0, 80, 0); }
            100% { transform: scale(0.8); opacity: 0.4; box-shadow: 0 0 0 0 rgba(255, 0, 80, 0); }
        }

        .widget-title {
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* Now Playing Section */
        .now-playing-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-main {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .cover-wrapper {
            position: relative;
            width: 72px;
            height: 72px;
            flex-shrink: 0;
        }

        .track-cover {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.5s ease, border-radius 0.5s ease;
        }

        .playing .track-cover {
            animation: rotate-cover 20s linear infinite;
            border-radius: 50%;
        }

        @keyframes rotate-cover {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Sound Equalizer Overlay */
        .eq-overlay {
            position: absolute;
            bottom: 4px;
            right: 4px;
            display: flex;
            gap: 2px;
            background: rgba(0, 0, 0, 0.65);
            padding: 3px 5px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .playing .eq-overlay {
            opacity: 1;
        }

        .eq-bar {
            width: 2px;
            height: 8px;
            background-color: var(--tiktok-cyan);
            border-radius: 1px;
            transform-origin: bottom;
            animation: bounce-bar 0.8s infinite alternate ease-in-out;
        }

        .eq-bar:nth-child(2) {
            animation-delay: 0.25s;
            height: 12px;
            background-color: var(--tiktok-red);
        }

        .eq-bar:nth-child(3) {
            animation-delay: 0.45s;
            height: 7px;
        }

        @keyframes bounce-bar {
            0% { transform: scaleY(0.2); }
            100% { transform: scaleY(1.1); }
        }

        .track-meta {
            flex-grow: 1;
            min-width: 0;
        }

        .track-title {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.25;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-requester {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            color: var(--tiktok-cyan);
            background: rgba(0, 242, 254, 0.08);
            border: 1px solid rgba(0, 242, 254, 0.15);
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 6px;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress Area */
        .progress-block {
            display: flex;
            flex-direction: column;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--tiktok-cyan), var(--tiktok-red));
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        .time-meta {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-family: 'Outfit', sans-serif;
        }

        /* Volume Control */
        .volume-block {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 12px;
        }

        .volume-icon {
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .volume-slider {
            flex-grow: 1;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--tiktok-cyan);
            box-shadow: 0 0 6px var(--tiktok-cyan);
            transition: transform 0.1s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .volume-value {
            font-size: 10px;
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            min-width: 26px;
            text-align: right;
        }

        /* Separator */
        .widget-divider {
            display: block;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            margin: 2px 0;
        }

        /* Queue Area */
        .queue-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .queue-subheader {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        .queue-count {
            background: rgba(255, 255, 255, 0.08);
            color: var(--tiktok-cyan);
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: 800;
        }

        .queue-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 270px; /* Fits exactly 6 items without expanding too much */
            overflow-y: auto;
            padding-right: 2px;
        }

        .queue-list::-webkit-scrollbar {
            width: 3px;
        }

        .queue-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: var(--bg-glass);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            font-size: 11px;
            animation: slide-in 0.3s ease forwards;
        }

        @keyframes slide-in {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .queue-index {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--tiktok-cyan);
            font-size: 10px;
            width: 12px;
            text-align: center;
        }

        .queue-artwork {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .queue-info {
            flex-grow: 1;
            min-width: 0;
        }

        .queue-title-text {
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-artist-text {
            font-size: 9px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-req-by {
            font-size: 9px;
            font-weight: 600;
            color: var(--tiktok-red);
            white-space: nowrap;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-queue {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            font-size: 11px;
            color: var(--text-secondary);
            font-style: italic;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        /* Order Guide Footer Banner */
        .widget-footer {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 8px 12px;
            border-radius: 12px;
            flex-direction: column;
            gap: 4px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .instruction-row {
            display: flex;
            justify-content: space-between;
        }

        .instruction-row span {
            font-weight: 700;
        }

        .instruction-row.order span {
            color: var(--tiktok-cyan);
        }

        .instruction-row.skip span {
            color: var(--tiktok-red);
        }

        /* Test Control Panel styling */
        .test-panel {
            margin-top: 20px;
            width: 360px;
            background: var(--bg-dark);
            backdrop-filter: blur(25px);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 18px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .test-panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-secondary);
            text-transform: uppercase;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
        }

        .test-input-group {
            display: flex;
            gap: 8px;
        }

        #test-query {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        #test-query:focus {
            border-color: var(--tiktok-cyan);
        }

        #test-play-btn {
            background: linear-gradient(135deg, var(--tiktok-cyan), #00b8d4);
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            color: #0c0c12;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        #test-play-btn:hover {
            transform: scale(1.03);
            opacity: 0.95;
        }

        .test-skip-btn {
            background: linear-gradient(135deg, var(--tiktok-red), #d60040);
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: white;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .test-skip-btn:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        .test-panel.hidden {
            display: none !important;
        }

        .overlay-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        
        .overlay-btn.secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            box-shadow: none;
        }
        
        .overlay-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <!-- Fullscreen Autoplay Bypass -->
    <div id="click-overlay">
        <div class="overlay-card">
            <div class="overlay-title">TIKTOK LIVE MUSIC BOT</div>
            <div class="overlay-desc">Browsers block audio autoplay. Choose the widget mode below to start:</div>
            <div class="overlay-actions">
                <button class="overlay-btn" id="btn-stream-mode">🎥 Stream Mode (hide test panel)</button>
                <button class="overlay-btn secondary" id="btn-test-mode">🛠 Test Mode (with test panel)</button>
            </div>
        </div>
    </div>

    <!-- Widget Container -->
    <div class="widget-viewport">
        <div class="stream-widget">
            
            <!-- Header -->
            <div class="widget-header">
                <span class="pulse-indicator"></span>
                <span class="widget-title">Live Music</span>
            </div>
            
            <!-- Now Playing -->
            <div class="now-playing-section">
                <div class="track-main">
                    <div class="cover-wrapper">
                        <img id="track-cover" class="track-cover" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231a1a24'/><circle cx='50' cy='50' r='10' fill='%23333344'/></svg>" alt="Cover">
                        <div class="eq-overlay">
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                            <div class="eq-bar"></div>
                        </div>
                    </div>
                    <div class="track-meta">
                        <div class="track-title" id="current-title">Waiting for requests...</div>
                        <div class="track-artist" id="current-artist">Order a track in chat!</div>
                        <div class="track-requester" id="current-requester">-</div>
                    </div>
                </div>
                
                <!-- Progress bar -->
                <div class="progress-block">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-bar"></div>
                    </div>
                    <div class="time-meta">
                        <span id="time-current">0:00</span>
                        <span id="time-duration">0:00</span>
                    </div>
                </div>

                <!-- Volume slider -->
                <div class="volume-block">
                    <span class="volume-icon" id="volume-btn">🔊</span>
                    <input type="range" id="volume-slider" min="0" max="100" value="80" class="volume-slider">
                    <span id="volume-value" class="volume-value">80%</span>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="widget-divider"></div>
            
            <!-- Queue Section -->
            <div class="queue-section">
                <div class="queue-subheader">
                    <span>TRACK QUEUE</span>
                    <span class="queue-count" id="queue-count">0</span>
                </div>
                <div class="queue-list" id="queue-list">
                    <div class="empty-queue">Queue is empty</div>
                </div>
            </div>
            
            <!-- Divider -->
            <div class="widget-divider"></div>

            <!-- Footer instructions -->
            <div class="widget-footer">
                <div class="instruction-row order">
                    <span>Request track:</span>
                    <span>!play [song]</span>
                </div>
                <div class="instruction-row skip">
                    <span>Skip track:</span>
                    <span>!skip</span>
                </div>
            </div>

        </div>

        <!-- Test Control Panel (visible for local testing, easily croppable in OBS/TikTok Studio) -->
        <div class="test-panel hidden" id="test-panel">
            <div class="test-panel-title">Test Control Panel (Chat Emulation)</div>
            <div class="test-input-group">
                <input type="text" id="test-query" placeholder="Enter !play [track], !skip or !gift [coins]..." autocomplete="off">
                <button id="test-play-btn">Send</button>
            </div>
            <button id="test-skip-btn" class="test-skip-btn">Quick Skip Button (!skip)</button>
        </div>
    </div>

    <!-- Hidden HTML5 Audio Element -->
    <audio id="audio-player" autocomplete="off"></audio>

    <script>
        // НАСТРОЙКА РЕЖИМА ПО УМОЛЧАНИЮ
        const CLIENT_CONFIG = {
            defaultMode: 'stream', // 'stream' (скрыть тест-панель для стрима) или 'test' (показать панель для тестов)
            skipOverlay: true      // true - сразу запускать виджет без показа экрана выбора режима, false - показывать выбор
        };

        const audio = document.getElementById('audio-player');
        const ws = new WebSocket('ws://localhost:3000');
        const widget = document.querySelector('.stream-widget');
        const overlay = document.getElementById('click-overlay');
        const btnStreamMode = document.getElementById('btn-stream-mode');
        const btnTestMode = document.getElementById('btn-test-mode');
        const testPanel = document.getElementById('test-panel');
        const volumeSlider = document.getElementById('volume-slider');
        const volumeValue = document.getElementById('volume-value');
        const volumeBtn = document.getElementById('volume-btn');
        
        let localCurrentTrack = null;
        let isMuted = false;
        let preMuteVolume = 80;

        // Autoplay bypass activation & Mode Selector
        function startWidget(showTestPanel) {
            overlay.classList.add('hidden');
            if (showTestPanel) {
                testPanel.classList.remove('hidden');
            } else {
                testPanel.classList.add('hidden');
            }
            audio.play().catch(e => console.log("Player unlocked. Waiting for tracks."));
        }

        btnStreamMode.addEventListener('click', () => startWidget(false));
        btnTestMode.addEventListener('click', () => startWidget(true));

        // Инициализация режима на основе URL параметров или конфигурации выше
        const urlParams = new URLSearchParams(window.location.search);
        const modeParam = urlParams.get('mode'); // 'stream' или 'test'
        const skipOverlayParam = urlParams.get('skipOverlay'); // 'true' или 'false'

        const finalMode = modeParam || CLIENT_CONFIG.defaultMode;
        const finalSkipOverlay = skipOverlayParam !== null ? (skipOverlayParam === 'true') : CLIENT_CONFIG.skipOverlay;

        if (finalSkipOverlay) {
            // Небольшая задержка для надежной инициализации аудио в OBS/TikTok Live Studio
            setTimeout(() => {
                startWidget(finalMode === 'test');
            }, 100);
        }

        // Volume Management
        const savedVolume = localStorage.getItem('bot-player-volume');
        if (savedVolume !== null) {
            audio.volume = savedVolume / 100;
            volumeSlider.value = savedVolume;
            volumeValue.innerText = `${savedVolume}%`;
        } else {
            audio.volume = 0.8;
            volumeSlider.value = 80;
            volumeValue.innerText = '80%';
        }

        volumeSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val / 100;
            volumeValue.innerText = `${val}%`;
            localStorage.setItem('bot-player-volume', val);
            
            if (val > 0) {
                isMuted = false;
                volumeBtn.innerText = val > 50 ? '🔊' : '🔉';
            } else {
                isMuted = true;
                volumeBtn.innerText = '🔇';
            }
        });

        volumeBtn.addEventListener('click', () => {
            if (isMuted) {
                audio.volume = preMuteVolume / 100;
                volumeSlider.value = preMuteVolume;
                volumeValue.innerText = `${preMuteVolume}%`;
                volumeBtn.innerText = preMuteVolume > 50 ? '🔊' : '🔉';
                isMuted = false;
            } else {
                preMuteVolume = volumeSlider.value;
                audio.volume = 0;
                volumeSlider.value = 0;
                volumeValue.innerText = '0%';
                volumeBtn.innerText = '🔇';
                isMuted = true;
            }
        });

        // WebSocket Sync
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'UPDATE_PLAYLIST') {
                // Check if track changed BEFORE updateUI mutates localCurrentTrack
                const isNewTrack = (!localCurrentTrack || localCurrentTrack.id !== data.currentTrack?.id) && data.currentTrack;
                
                updateUI(data.playlist, data.currentTrack, data.settings, data.viewerBalances);
                
                // If a new track was loaded or track changed
                if (isNewTrack) {
                    playTrack(data.currentTrack);
                } else if (!data.currentTrack) {
                    localCurrentTrack = null;
                    audio.src = '';
                    widget.classList.remove('playing');
                }
            }
            
            if (data.type === 'SKIP_TRACK') {
                handleTrackEnded();
            }
        };

        function updateUI(playlist, currentTrack, settings, viewerBalances) {
            localCurrentTrack = currentTrack;
            
            // Update prices in instructions
            if (settings) {
                const playPrice = settings.playPriceCoins || 0;
                const skipPrice = settings.skipPriceCoins || 0;
                
                const orderSpan = document.querySelector('.instruction-row.order span:last-child');
                const skipSpan = document.querySelector('.instruction-row.skip span:last-child');
                
                if (orderSpan) {
                    orderSpan.innerText = playPrice > 0 ? `!play [song] (${playPrice} coin/s)` : `!play [song]`;
                }
                if (skipSpan) {
                    skipSpan.innerText = skipPrice > 0 ? `!skip (${skipPrice} coin/s)` : `!skip`;
                }
            }
            
            if (currentTrack) {
                document.getElementById('current-title').innerText = currentTrack.title;
                document.getElementById('current-artist').innerText = currentTrack.artist;
                
                const balance = (viewerBalances && viewerBalances[currentTrack.requestedBy]) ? viewerBalances[currentTrack.requestedBy].skips : 0;
                const showBalance = settings && (settings.playPriceCoins > 0 || settings.skipPriceCoins > 0);
                const balanceStr = showBalance ? ` (skips: ${balance})` : '';
                document.getElementById('current-requester').innerText = `@${currentTrack.requestedBy}${balanceStr}`;
                
                if (currentTrack.artworkUrl) {
                    document.getElementById('track-cover').src = currentTrack.artworkUrl;
                } else {
                    document.getElementById('track-cover').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231a1a24'/><circle cx='50' cy='50' r='10' fill='%23333344'/></svg>";
                }
            } else {
                document.getElementById('current-title').innerText = "Waiting for requests...";
                document.getElementById('current-artist').innerText = "Order a track in chat!";
                document.getElementById('current-requester').innerText = "-";
                document.getElementById('track-cover').src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231a1a24'/><circle cx='50' cy='50' r='10' fill='%23333344'/></svg>";
                
                // Clear times
                document.getElementById('progress-bar').style.width = '0%';
                document.getElementById('time-current').innerText = '0:00';
                document.getElementById('time-duration').innerText = '0:00';
            }

            // Update queue box
            const queueList = document.getElementById('queue-list');
            const queueCount = document.getElementById('queue-count');
            queueList.innerHTML = '';
            queueCount.innerText = `${playlist.length}/10`;
            
            if (playlist.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'empty-queue';
                empty.innerText = 'Queue is empty';
                queueList.appendChild(empty);
            } else {
                // Show a maximum of 6 items visually
                const visiblePlaylist = playlist.slice(0, 6);
                visiblePlaylist.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = 'queue-item';
                    
                    const art = track.artworkUrl || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='30' height='30' viewBox='0 0 30 30'><rect width='30' height='30' fill='%23121216'/></svg>";
                    
                    const balance = (viewerBalances && viewerBalances[track.requestedBy]) ? viewerBalances[track.requestedBy].skips : 0;
                    const showBalance = settings && (settings.playPriceCoins > 0 || settings.skipPriceCoins > 0);
                    const balanceStr = showBalance ? ` (balance: ${balance})` : '';

                    item.innerHTML = `
                        <div class="queue-index">${index + 1}</div>
                        <img class="queue-artwork" src="${art}" alt="Art">
                        <div class="queue-info">
                            <div class="queue-title-text">${track.title}</div>
                            <div class="queue-artist-text">${track.artist}</div>
                        </div>
                        <div class="queue-req-by">@${track.requestedBy}${balanceStr}</div>
                    `;
                    queueList.appendChild(item);
                });
            }
        }

        function playTrack(track) {
            console.log("Playing MP3:", track.audioUrl);
            audio.src = track.audioUrl;
            audio.play().catch(e => console.log("Playback blocked. Interaction required."));
        }

        // Track state listeners
        audio.addEventListener('play', () => {
            widget.classList.add('playing');
        });
        audio.addEventListener('pause', () => {
            widget.classList.remove('playing');
        });
        audio.addEventListener('ended', () => {
            widget.classList.remove('playing');
            handleTrackEnded();
        });

        // Time / Progress updates
        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            const formatTime = (time) => {
                if (isNaN(time)) return '0:00';
                const mins = Math.floor(time / 60);
                const secs = Math.floor(time % 60).toString().padStart(2, '0');
                return `${mins}:${secs}`;
            };
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            document.getElementById('time-duration').innerText = formatTime(audio.duration);
        });

        // Test Panel Event Listeners
        const testPlayBtn = document.getElementById('test-play-btn');
        const testSkipBtn = document.getElementById('test-skip-btn');
        const testQueryInput = document.getElementById('test-query');

        function sendTestCommand(data) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
            } else {
                console.warn("WebSocket is not ready yet. Please try again in a second.");
            }
        }

        testPlayBtn.addEventListener('click', () => {
            const message = testQueryInput.value.trim();
            if (!message) return;
            
            sendTestCommand({ type: 'TEST_CHAT', message: message });
            testQueryInput.value = '';
        });

        testQueryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                testPlayBtn.click();
            }
        });

        testSkipBtn.addEventListener('click', () => {
            sendTestCommand({ type: 'TEST_CHAT', message: '!skip' });
        });

        function handleTrackEnded() {
            fetch('/next');
        }
    </script>
</body>
</html>
